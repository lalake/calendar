<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>轮班日历</title>
  <style>
    :root {
      --bg-top: #f7efe1;
      --bg-bottom: #f2f5f7;
      --paper: rgba(255, 251, 244, 0.88);
      --paper-strong: rgba(255, 249, 239, 0.98);
      --text: #2f2a24;
      --muted: #766b5f;
      --line: rgba(113, 95, 78, 0.14);
      --shadow: 0 18px 48px rgba(112, 90, 64, 0.12);
      --accent: #b34a30;
      --accent-soft: rgba(179, 74, 48, 0.12);
      --rest: #3f7d57;
      --morning: #cf5c36;
      --middle: #b57b21;
      --night: #315d9c;
      --card-radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(203, 105, 63, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(200, 170, 80, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
      background: none;
    }

    .app {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 18px 14px 32px;
    }

    .surface {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero {
      padding: 18px;
      margin-bottom: 14px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .month-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.05;
    }

    .sub-title {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .icon-button,
    .nav-button,
    .panel-button,
    .mini-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .icon-button:active,
    .nav-button:active,
    .panel-button:active,
    .mini-button:active {
      transform: scale(0.98);
    }

    .icon-button {
      min-width: 50px;
      height: 50px;
      border-radius: 16px;
      font-weight: 700;
    }

    .nav-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .nav-button {
      padding: 12px 10px;
      border-radius: 16px;
      font-weight: 600;
    }

    .nav-button.primary {
      background: linear-gradient(135deg, rgba(179, 74, 48, 0.16), rgba(179, 74, 48, 0.08));
      border-color: rgba(179, 74, 48, 0.26);
    }

    .calendar-shell {
      padding: 12px;
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 8px;
    }

    .weekday {
      padding: 8px 0;
      text-align: center;
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--muted);
    }

    .calendar-grid {
      animation: fade-slide 0.22s ease;
    }

    .day-card {
      min-height: 92px;
      padding: 10px 8px;
      border-radius: 18px;
      border: 1px solid rgba(113, 95, 78, 0.1);
      background: rgba(255, 255, 255, 0.7);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      overflow: hidden;
    }

    .day-card.current-month {
      background: rgba(255, 255, 255, 0.84);
    }

    .day-card.other-month {
      opacity: 0.55;
    }

    .day-card.today {
      border-color: rgba(179, 74, 48, 0.44);
      box-shadow: 0 8px 22px rgba(179, 74, 48, 0.16);
      background: linear-gradient(180deg, rgba(255, 249, 241, 0.96), rgba(255, 255, 255, 0.88));
    }

    .day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .day-number {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
    }

    .today-tag {
      padding: 2px 6px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .lunar-text {
      font-size: 0.76rem;
      line-height: 1.2;
      min-height: 1.2em;
      word-break: break-all;
    }

    .lunar-text {
      color: var(--muted);
    }

    .shift-badge {
      align-self: flex-start;
      padding: 4px 8px;
      border-radius: 999px;
      color: #fff;
      font-size: 0.72rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .shift-早班 {
      background: linear-gradient(135deg, var(--morning), #d68254);
    }

    .shift-中班 {
      background: linear-gradient(135deg, var(--middle), #c69b47);
    }

    .shift-晚班 {
      background: linear-gradient(135deg, var(--night), #5f7fc0);
    }

    .shift-休息 {
      background: linear-gradient(135deg, var(--rest), #66a17a);
    }

    .legend {
      margin-top: 14px;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .legend-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .legend-note {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(44, 34, 27, 0.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 30;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      position: absolute;
      inset: auto 0 0 0;
      background: var(--paper-strong);
      border-radius: 28px 28px 0 0;
      min-height: 58vh;
      max-height: 88vh;
      overflow: auto;
      transform: translateY(100%);
      transition: transform 0.24s ease;
      box-shadow: 0 -18px 40px rgba(49, 37, 27, 0.18);
    }

    .overlay.open .panel {
      transform: translateY(0);
    }

    .panel-inner {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 20px 18px calc(28px + env(safe-area-inset-bottom));
    }

    .panel-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.45rem;
    }

    .panel-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .form-block {
      margin-bottom: 18px;
    }

    .field-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .field-label {
      font-size: 0.94rem;
      font-weight: 700;
    }

    .field-tip {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .date-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
    }

    .sequence-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .sequence-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(113, 95, 78, 0.1);
    }

    .sequence-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .sequence-order {
      min-width: 50px;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(179, 74, 48, 0.08);
      color: var(--accent);
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .sequence-name {
      font-size: 1rem;
      font-weight: 700;
    }

    .sequence-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .mini-button {
      min-width: 44px;
      height: 40px;
      border-radius: 12px;
      font-weight: 700;
    }

    .mini-button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .panel-button {
      padding: 13px 14px;
      border-radius: 16px;
      font-weight: 700;
    }

    .panel-button.primary {
      background: linear-gradient(135deg, #b34a30, #c45c3f);
      color: #fff;
      border-color: transparent;
    }

    .panel-button.secondary {
      background: rgba(255, 255, 255, 0.82);
    }

    .text-button {
      padding: 6px 0;
      color: var(--accent);
      font-weight: 700;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      transform: translate(-50%, 16px);
      min-width: 180px;
      max-width: calc(100% - 32px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(39, 34, 29, 0.9);
      color: #fff;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px 10px 26px;
      }

      .hero,
      .calendar-shell {
        border-radius: 22px;
      }

      .hero-top {
        align-items: stretch;
      }

      .icon-button {
        min-width: 46px;
        height: 46px;
      }

      .day-card {
        min-height: 86px;
        padding: 9px 7px;
        border-radius: 16px;
      }

      .day-number {
        font-size: 0.96rem;
      }

      .lunar-text {
        font-size: 0.72rem;
      }

      .shift-badge {
        padding: 4px 7px;
        font-size: 0.7rem;
      }

      .action-row {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 768px) {
      .calendar-shell {
        padding: 14px;
      }

      .day-card {
        min-height: 110px;
        padding: 12px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="surface hero">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Shift Calendar</p>
          <h1 class="month-title" id="monthLabel"></h1>
          <p class="sub-title" id="subTitle"></p>
        </div>
        <button class="icon-button" id="openConfigButton" type="button" aria-label="打开配置面板">配置</button>
      </div>

      <div class="nav-row">
        <button class="nav-button" id="prevMonthButton" type="button">上个月</button>
        <button class="nav-button primary" id="todayButton" type="button">回到今天</button>
        <button class="nav-button" id="nextMonthButton" type="button">下个月</button>
      </div>
    </section>

    <section class="surface calendar-shell">
      <div class="weekdays">
        <div class="weekday">周一</div>
        <div class="weekday">周二</div>
        <div class="weekday">周三</div>
        <div class="weekday">周四</div>
        <div class="weekday">周五</div>
        <div class="weekday">周六</div>
        <div class="weekday">周日</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <section class="surface legend">
      <div class="legend-group">
        <span class="shift-badge shift-早班">早班</span>
        <span class="shift-badge shift-中班">中班</span>
        <span class="shift-badge shift-晚班">晚班</span>
        <span class="shift-badge shift-休息">休息</span>
      </div>
      <div class="legend-note">从周一开始显示，仅展示农历和班次。</div>
    </section>
  </main>

  <div class="overlay" id="configOverlay" aria-hidden="true">
    <section class="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
      <div class="panel-inner">
        <div class="panel-top">
          <div>
            <p class="eyebrow">配置</p>
            <h2 class="panel-title" id="panelTitle">轮班设置</h2>
            <p class="panel-subtitle">起始日期当天会使用顺序中的第一个班次，每个班次连续两天，然后按你设置的顺序循环。</p>
          </div>
          <button class="icon-button" id="closeConfigButton" type="button" aria-label="关闭配置面板">关闭</button>
        </div>

        <form id="configForm">
          <div class="form-block">
            <div class="field-label-row">
              <label class="field-label" for="startDateInput">轮班起始日期</label>
            </div>
            <input class="date-input" id="startDateInput" name="startDate" type="date" required />
          </div>

          <div class="form-block">
            <div class="field-label-row">
              <div class="field-label">轮班顺序</div>
              <button class="text-button" id="resetSequenceButton" type="button">恢复默认顺序</button>
            </div>
            <p class="field-tip">顺序中的每一项都会连续排两天。使用上下按钮调整顺序即可。</p>
            <div class="sequence-list" id="sequenceList"></div>
          </div>

          <div class="action-row">
            <button class="panel-button secondary" id="resetConfigButton" type="button">清除本地配置</button>
            <button class="panel-button primary" type="submit">保存配置</button>
          </div>
        </form>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    (() => {
      const DAY_MS = 24 * 60 * 60 * 1000;
      const STORAGE_KEY = "shift-calendar-config-v1";
      const SHIFT_OPTIONS = ["晚班", "中班", "早班", "休息"];
      const DEFAULT_START_DATE = "2026-03-25";
      const SHIFT_HINTS = {
        "早班": "上午值班",
        "中班": "白天中段",
        "晚班": "夜间值班",

      };
      const LUNAR_INFO = [

        0x07954, 0x06aa0, 0x0ad50, 0x05b52, 0x04b60, 0x0a6e6, 0x0a4e0, 0x0d260, 0x0ea65, 0x0d530,

        0x0b5a0, 0x056d0, 0x055b2, 0x049b0, 0x0a577, 0x0a4b0, 0x0aa50, 0x1b255, 0x06d20, 0x0ada0,

        0x0a2e0, 0x0d2e3, 0x0c960, 0x0d557, 0x0d4a0, 0x0da50, 0x05d55, 0x056a0, 0x0a6d0, 0x055d4,
        0x052d0, 0x0a9b8, 0x0a950, 0x0b4a0, 0x0b6a6, 0x0ad50, 0x055a0, 0x0aba4, 0x0a5b0, 0x052b0,
        0x0b273, 0x06930, 0x07337, 0x06aa0, 0x0ad50, 0x14b55, 0x04b60, 0x0a570, 0x054e4, 0x0d160,
        0x0e968, 0x0d520, 0x0daa0, 0x16aa6, 0x056d0, 0x04ae0, 0x0a9d4, 0x0a2d0, 0x0d150, 0x0f252,
        0x0d520
      ];
      const LUNAR_MONTH_NAMES = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "冬月", "腊月"];
      const LUNAR_DAY_NAMES = [
        "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
        "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
        "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"
      ];
      const LUNAR_INTL_FORMATTER = createLunarIntlFormatter();

      const today = atNoon(new Date());
      const state = {
        viewDate: new Date(today.getFullYear(), today.getMonth(), 1, 12),
        config: loadConfig(),
        draftSequence: []
      };

      const monthLabel = document.getElementById("monthLabel");
      const subTitle = document.getElementById("subTitle");
      const calendarGrid = document.getElementById("calendarGrid");
      const configOverlay = document.getElementById("configOverlay");
      const configForm = document.getElementById("configForm");
      const startDateInput = document.getElementById("startDateInput");
      const sequenceList = document.getElementById("sequenceList");
      const toast = document.getElementById("toast");

      document.getElementById("prevMonthButton").addEventListener("click", () => {
        state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() - 1, 1, 12);
        render();
      });

      document.getElementById("nextMonthButton").addEventListener("click", () => {
        state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + 1, 1, 12);
        render();
      });

      document.getElementById("todayButton").addEventListener("click", () => {
        state.viewDate = new Date(today.getFullYear(), today.getMonth(), 1, 12);
        render();
      });

      document.getElementById("openConfigButton").addEventListener("click", openConfig);
      document.getElementById("closeConfigButton").addEventListener("click", closeConfig);
      document.getElementById("resetSequenceButton").addEventListener("click", () => {
        state.draftSequence = [...SHIFT_OPTIONS];
        renderSequenceList();
      });

      document.getElementById("resetConfigButton").addEventListener("click", () => {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
        }
        state.config = createDefaultConfig();
        closeConfig();
        render();
        showToast("已恢复默认配置");
      });

      configOverlay.addEventListener("click", (event) => {
        if (event.target === configOverlay) {
          closeConfig();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && configOverlay.classList.contains("open")) {
          closeConfig();
        }
      });

      sequenceList.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-move]");
        if (!button) {
          return;
        }
        const index = Number(button.dataset.index);
        const delta = Number(button.dataset.move);
        moveSequence(index, delta);
      });

      configForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const startDate = startDateInput.value;
        if (!startDate) {
          showToast("请先选择起始日期");
          return;
        }
        state.config = {
          startDate,
          sequence: [...state.draftSequence]
        };
        persistConfig(state.config);
        closeConfig();
        render();
        showToast("配置已保存");
      });

      function render() {
        renderHeader();
        renderCalendar();
      }

      function renderHeader() {
        const year = state.viewDate.getFullYear();
        const month = state.viewDate.getMonth() + 1;
        monthLabel.textContent = `${year}年${month}月`;
        const todayShift = getShiftForDate(today, state.config);
        subTitle.textContent = `今天 ${formatSolarDate(today)} · ${todayShift} · 周一起始`;
      }

      function renderCalendar() {
        const year = state.viewDate.getFullYear();
        const month = state.viewDate.getMonth();
        const firstDay = new Date(year, month, 1, 12);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const leadingDays = (firstDay.getDay() + 6) % 7;
        const total = Math.ceil((leadingDays + daysInMonth) / 7) * 7;
        const gridStart = new Date(year, month, 1 - leadingDays, 12);

        const cells = [];
        for (let index = 0; index < total; index += 1) {
          const current = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + index, 12);
          const lunar = solarToLunar(current);
          const shift = getShiftForDate(current, state.config);
          const isCurrentMonth = current.getMonth() === month;
          const isToday = isSameDate(current, today);
          const lunarText = lunar ? formatLunarLabel(lunar) : "";
          const classNames = [
            "day-card",
            isCurrentMonth ? "current-month" : "other-month",
            isToday ? "today" : ""
          ].filter(Boolean).join(" ");

          cells.push(`
            <article class="${classNames}" title="${buildTitle(current, lunar, shift)}">
              <div class="day-top">
                <div class="day-number">${current.getDate()}</div>
                ${isToday ? '<span class="today-tag">今天</span>' : ""}
              </div>
              <div class="lunar-text">${lunarText}</div>
              <div class="shift-badge shift-${shift}">${shift}</div>
            </article>
          `);
        }

        calendarGrid.innerHTML = cells.join("");
      }

      function openConfig() {
        state.draftSequence = [...state.config.sequence];
        startDateInput.value = state.config.startDate;
        renderSequenceList();
        document.body.classList.add("modal-open");
        configOverlay.classList.add("open");
        configOverlay.setAttribute("aria-hidden", "false");
      }

      function closeConfig() {
        configOverlay.classList.remove("open");
        configOverlay.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-open");
      }

      function renderSequenceList() {
        sequenceList.innerHTML = state.draftSequence.map((item, index) => `
          <div class="sequence-item">
            <div class="sequence-main">
              <div class="sequence-order">第 ${index + 1} 位</div>
              <div>
                <div class="sequence-name">${item}</div>
                <div class="field-tip">${SHIFT_HINTS[item]}</div>
              </div>
            </div>
            <div class="sequence-actions">
              <button
                class="mini-button"
                type="button"
                data-index="${index}"
                data-move="-1"
                aria-label="上移 ${item}"
                ${index === 0 ? "disabled" : ""}
              >↑</button>
              <button
                class="mini-button"
                type="button"
                data-index="${index}"
                data-move="1"
                aria-label="下移 ${item}"
                ${index === state.draftSequence.length - 1 ? "disabled" : ""}
              >↓</button>
            </div>
          </div>
        `).join("");
      }

      function moveSequence(index, delta) {
        const target = index + delta;
        if (target < 0 || target >= state.draftSequence.length) {
          return;
        }
        const next = [...state.draftSequence];
        [next[index], next[target]] = [next[target], next[index]];
        state.draftSequence = next;
        renderSequenceList();
      }

      function createDefaultConfig() {
        return {
          startDate: DEFAULT_START_DATE,
          sequence: [...SHIFT_OPTIONS]
        };
      }

      function loadConfig() {
        const fallback = createDefaultConfig();
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return fallback;
          }
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.startDate || !Array.isArray(parsed.sequence)) {
            return fallback;
          }
          const sequence = parsed.sequence.filter((item) => SHIFT_OPTIONS.includes(item));
          if (sequence.length !== SHIFT_OPTIONS.length || new Set(sequence).size !== SHIFT_OPTIONS.length) {
            return fallback;
          }
          return {
            startDate: parsed.startDate,
            sequence
          };
        } catch (error) {
          return fallback;
        }
      }

      function persistConfig(config) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        } catch (error) {
          showToast("浏览器不允许写入本地配置");
        }
      }

      function getShiftForDate(date, config) {
        const start = parseDate(config.startDate);
        const diff = diffDays(date, start);
        const cycleLength = config.sequence.length * 2;
        const normalized = ((diff % cycleLength) + cycleLength) % cycleLength;
        const shiftIndex = Math.floor(normalized / 2);
        return config.sequence[shiftIndex];
      }

      function getCycleDay(date, config) {
        const start = parseDate(config.startDate);
        const diff = diffDays(date, start);
        const cycleLength = config.sequence.length * 2;
        return ((diff % cycleLength) + cycleLength) % cycleLength + 1;
      }

      function buildTitle(date, lunar, shift) {
        const parts = [formatSolarDate(date), shift];
        if (lunar) {
          parts.push(`农历${lunar.isLeap ? "闰" : ""}${LUNAR_MONTH_NAMES[lunar.month - 1]}${lunar.day === 1 ? "" : LUNAR_DAY_NAMES[lunar.day - 1]}`);
        }
        return parts.join(" | ");
      }

      function solarToLunar(date) {
        const intlLunar = getIntlLunarInfo(date);
        if (intlLunar) {
          return intlLunar;
        }
        return solarToLunarFallback(date);
      }

      function createLunarIntlFormatter() {
        try {
          const formatter = new Intl.DateTimeFormat("zh-CN-u-ca-chinese", {
            year: "numeric",
            month: "long",
            day: "numeric"
          });
          const sample = formatter.formatToParts(new Date(2026, 1, 17, 12));
          if (!sample.some((part) => part.type === "month") || !sample.some((part) => part.type === "day")) {
            return null;
          }
          return formatter;
        } catch (error) {
          return null;
        }
      }

      function getIntlLunarInfo(date) {
        if (!LUNAR_INTL_FORMATTER) {
          return null;
        }
        try {
          const parts = LUNAR_INTL_FORMATTER.formatToParts(atNoon(date));
          const yearText = parts.find((part) => part.type === "relatedYear")?.value;
          const monthText = parts.find((part) => part.type === "month")?.value;
          const dayText = parts.find((part) => part.type === "day")?.value;
          if (!monthText || !dayText || !yearText) {
            return null;
          }
          const isLeap = monthText.startsWith("闰");
          const normalizedMonth = monthText.replace(/^闰/, "");
          const month = LUNAR_MONTH_NAMES.indexOf(normalizedMonth) + 1;
          const day = Number(dayText);
          if (month < 1 || !Number.isInteger(day) || day < 1 || day > 30) {
            return null;
          }
          return {
            year: Number(yearText),
            month,
            day,
            isLeap
          };
        } catch (error) {
          return null;
        }
      }

      function solarToLunarFallback(date) {
        const target = atNoon(date);
        const min = new Date(1900, 0, 31, 12);
        const max = new Date(2101, 0, 28, 12);
        if (target < min || target >= max) {
          return null;
        }

        let offset = diffDays(target, min);
        let lunarYear;
        let lunarMonth;
        let lunarDay;
        let isLeap = false;

        for (lunarYear = 1900; lunarYear < 2101 && offset > 0; lunarYear += 1) {
          const yearDays = getLunarYearDays(lunarYear);
          if (offset < yearDays) {
            break;
          }
          offset -= yearDays;
        }

        const leapMonth = getLeapMonth(lunarYear);
        for (lunarMonth = 1; lunarMonth <= 12 && offset >= 0; lunarMonth += 1) {
          let monthDays;
          if (leapMonth > 0 && lunarMonth === leapMonth + 1 && !isLeap) {
            lunarMonth -= 1;
            isLeap = true;
            monthDays = getLeapDays(lunarYear);
          } else {
            monthDays = getLunarMonthDays(lunarYear, lunarMonth);
          }

          if (offset < monthDays) {
            break;
          }

          offset -= monthDays;

          if (isLeap && lunarMonth === leapMonth) {
            isLeap = false;
          }
        }

        lunarDay = offset + 1;
        return {
          year: lunarYear,
          month: lunarMonth,
          day: lunarDay,
          isLeap
        };
      }

      function getLunarYearDays(year) {
        let sum = 348;
        for (let bit = 0x8000; bit > 0x8; bit >>= 1) {
          sum += (LUNAR_INFO[year - 1900] & bit) ? 1 : 0;
        }
        return sum + getLeapDays(year);
      }

      function getLeapMonth(year) {
        return LUNAR_INFO[year - 1900] & 0xf;
      }

      function getLeapDays(year) {
        if (getLeapMonth(year)) {
          return (LUNAR_INFO[year - 1900] & 0x10000) ? 30 : 29;
        }
        return 0;
      }

      function getLunarMonthDays(year, month) {
        return (LUNAR_INFO[year - 1900] & (0x10000 >> month)) ? 30 : 29;
      }

      function formatLunarLabel(lunar) {
        if (lunar.day === 1) {
          return `${lunar.isLeap ? "闰" : ""}${LUNAR_MONTH_NAMES[lunar.month - 1]}`;
        }
        return LUNAR_DAY_NAMES[lunar.day - 1];
      }

      function formatSolarDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function formatDateValue(date) {
        return formatSolarDate(date);
      }

      function parseDate(value) {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day, 12);
      }

      function diffDays(a, b) {
        return Math.round((atNoon(a) - atNoon(b)) / DAY_MS);
      }

      function atNoon(date) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
      }

      function isSameDate(a, b) {
        return a.getFullYear() === b.getFullYear()
          && a.getMonth() === b.getMonth()
          && a.getDate() === b.getDate();
      }

      let toastTimer = null;
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() => {
          toast.classList.remove("show");
        }, 2200);
      }

      render();
    })();
  </script>
</body>
</html>
